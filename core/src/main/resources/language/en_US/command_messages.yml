# ============================================================
# SmartSpawner – command_messages.yml  (en_US)
# Dedicated file for command-related messages.
# Uses a nested key structure: <command>.<action>.message / sound
# Component & bossbar texts are also stored here.
# ============================================================

# General (shared across multiple commands)
player_only:
  message: "&#ff5252ᴛʜɪꜱ ᴄᴏᴍᴍᴀɴᴅ ᴄᴀɴ ᴏɴʟʏ ʙᴇ ᴜꜱᴇᴅ ʙʏ ᴘʟᴀʏᴇʀꜱ."
  sound: block.note_block.bass

# ──────────────────────────────────────────
#  /ss near
# ──────────────────────────────────────────
near:
  # BossBar texts (plain text – colour is set in code)
  bossbar:
    analyzing: "🔍 ᴀɴᴀʟʏᴢɪɴɢ... {percent}%"
    found: "✓ ꜰᴏᴜɴᴅ {count} ꜱᴘᴀᴡɴᴇʀ(ꜱ) ᴡɪᴛʜɪɴ {radius} ʙʟᴏᴄᴋꜱ"
    not_found: "✗ ɴᴏ ꜱᴘᴀᴡɴᴇʀꜱ ꜰᴏᴜɴᴅ ᴡɪᴛʜɪɴ {radius} ʙʟᴏᴄᴋꜱ"
  # Clickable chat component texts (plain text – colour/style are set in code)
  view_gui:
    button: "[ᴠɪᴇᴡ ɪɴ ɢᴜɪ]"
    hover: "Click to browse the {count} spawner(s) found nearby"
  scan_start:
    message: "&#3498db🔍 ꜱᴄᴀɴɴɪɴɢ ꜰᴏʀ ꜱᴘᴀᴡɴᴇʀꜱ ᴡɪᴛʜɪɴ &#f8f8ff{radius} &#3498dbʙʟᴏᴄᴋꜱ…"
    sound: block.note_block.hat
  scan_found:
    message: "&#37eb9a✓ ꜰᴏᴜɴᴅ &#f8f8ff{count} &#37eb9aꜱᴘᴀᴡɴᴇʀ(ꜱ) ᴡɪᴛʜɪɴ &#f8f8ff{radius} &#37eb9aʙʟᴏᴄᴋꜱ. &#f1c40fʜɪɢʜʟɪɢʜᴛꜱ ʟᴀꜱᴛ &#f8f8ff30ꜱ&#f1c40f."
    sound: entity.experience_orb.pickup
  scan_none:
    message: "&#ff5252✗ ɴᴏ ꜱᴘᴀᴡɴᴇʀꜱ ꜰᴏᴜɴᴅ ᴡɪᴛʜɪɴ &#f8f8ff{radius} &#ff5252ʙʟᴏᴄᴋꜱ."
    sound: block.note_block.pling
  scan_cancelled:
    message: "&#f1c40f⊘ ꜱᴄᴀɴ ᴄᴀɴᴄᴇʟʟᴇᴅ & ʜɪɢʜʟɪɢʜᴛꜱ ʀᴇᴍᴏᴠᴇᴅ."
    sound: block.note_block.bass
  no_active_scan:
    message: "&#ff5252ʏᴏᴜ ʜᴀᴠᴇ ɴᴏ ᴀᴄᴛɪᴠᴇ ꜱᴄᴀɴ ᴛᴏ ᴄᴀɴᴄᴇʟ."
    sound: block.note_block.bass
  highlights_expired:
    message: "&#888888⏱ ꜱᴘᴀᴡɴᴇʀ ʜɪɢʜʟɪɢʜᴛꜱ ʜᴀᴠᴇ ᴇxᴘɪʀᴇᴅ."


# ──────────────────────────────────────────────────────────────────────────────
#   SmartSpawner – Hologram Text Display  (de_DE)
#   File: hologram.yml
# ──────────────────────────────────────────────────────────────────────────────
#
#   Verfügbare Platzhalter:
#     {entity}                  – Mob-Name (gemäß mob_names in formatting.yml)
#     {ᴇɴᴛɪᴛʏ}                 – Mob-Name in kleinen Unicode-Buchstaben
#     {stack_size}              – Anzahl gestapelter Spawner
#     {current_exp}             – Aktuell gespeicherte EP
#     {max_exp}                 – Maximale EP-Kapazität
#     {used_slots}              – Belegte Inventarplätze
#     {max_slots}               – Gesamte Inventarplätze
#     {percent_storage_decimal} – Lagernutzung in % (1 Dezimalstelle, z. B. "75.5")
#     {percent_storage_rounded} – Lagernutzung in % gerundet (z. B. "76")
#     {percent_exp_decimal}     – EP-Speicher in % (1 Dezimalstelle, z. B. "50.0")
#     {percent_exp_rounded}     – EP-Speicher in % gerundet (z. B. "50")
#
# ──────────────────────────────────────────────────────────────────────────────

text:
  - '[&#e6e6fa{stack_size}] &#3498db{ᴇɴᴛɪᴛʏ} ꜱᴘᴀᴡɴᴇʀ'
  - '&#5dade2• &#e6e6faxᴘ: &#37eb9a{current_exp}&#e6e6fa/&#37eb9a{max_exp}'
  - '&#5dade2• &#e6e6faɪᴛᴇᴍꜱ: &#37eb9a{used_slots}&#e6e6fa/&#37eb9a{max_slots}'

# ──────────────────────────────────────────────────────────────────────────────
#   SmartSpawner – Hologram Text Display  (vi_VN)
#   File: hologram.yml
# ──────────────────────────────────────────────────────────────────────────────
#
#   Available placeholders:
#     {entity}                  – Tên mob (theo mob_names trong formatting.yml)
#     {ᴇɴᴛɪᴛʏ}                 – Tên mob dạng chữ nhỏ unicode
#     {stack_size}              – Số lượng spawner ghép
#     {current_exp}             – XP đang lưu trữ
#     {max_exp}                 – Giới hạn XP tối đa
#     {used_slots}              – Ô kho đã dùng
#     {max_slots}               – Tổng số ô kho
#     {percent_storage_decimal} – % kho (1 chữ số thập phân, vd "75.5")
#     {percent_storage_rounded} – % kho làm tròn (vd "76")
#     {percent_exp_decimal}     – % XP (1 chữ số thập phân, vd "50.0")
#     {percent_exp_rounded}     – % XP làm tròn (vd "50")
#
# ──────────────────────────────────────────────────────────────────────────────

text:
  - '[&#e6e6fa{stack_size}] &#3498db{ᴇɴᴛɪᴛʏ} ꜱᴘᴀᴡɴᴇʀ'
  - '&#5dade2• &#e6e6faxᴘ: &#37eb9a{current_exp}&#e6e6fa/&#37eb9a{max_exp}'
  - '&#5dade2• &#e6e6faɪᴛᴇᴍꜱ: &#37eb9a{used_slots}&#e6e6fa/&#37eb9a{max_slots}'
